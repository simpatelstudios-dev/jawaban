<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>

<title>Simpatel Bot — PR & Roster Harian</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#060810;color:#dde3f0;

  padding:5px 16px;font-size:.78rem;color:#22d3ee;font-weight:600;

.footer{font-size:.75rem;color:#3d4a63;margin-top:40px}

<div class="wrap">
  <div class="ico">🤖</div>

    Halaman ini digunakan oleh Simpatel Bot untuk menampilkan

    <br/><br/>

  <div class="footer">

  </div>
